<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocFlow — Bad Idea Interactive</title>

  <!-- 1) Bootstrap first -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- 2) YOUR CSS last -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

    <div class="consulting-topbar">
        <a href="/" class="topbar-back">← Bad Idea Interactive</a>
        <div class="lang-selector">
            <select class="lang-select" onchange="setLanguage(this.value)">
                <option value="en">EN</option>
                <option value="es">ES</option>
                <option value="fr">FR</option>
            </select>
        </div>
        <a href="#book" class="btn btn-primary" data-i18n="consulting.hero.cta1"></a>
    </div>

    <section id="hero" class="section consulting-hero">
        <div class="container">
            <div class="row">
                <div class="col-lg-8">
                    <span class="hero-eyebrow" data-i18n="locflow.hero.eyebrow"></span>
                    <h1 class="hero-title" data-i18n="locflow.hero.title"></h1>
                    <p data-i18n="locflow.hero.subtext"></p>
                </div>
            </div>
        </div>
    </section>

    <section id="features" class="section light">
        <div class="container">
            <div class="row mb-4">
                <div class="col">
                    <h2 class="section-title" data-i18n="locflow.features.title"></h2>
                    <p class="section-lead" data-i18n="locflow.features.lead"></p>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <ul class="service-list">
                        <li data-i18n="locflow.features.li1"></li>
                        <li data-i18n="locflow.features.li2"></li>
                        <li data-i18n="locflow.features.li3"></li>
                        <li data-i18n="locflow.features.li4"></li>
                        <li data-i18n="locflow.features.li5"></li>
                        <li data-i18n="locflow.features.li6"></li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <section id="process" class="section">
        <div class="container">
            <div class="row mb-4">
                <div class="col">
                    <h2 class="section-title" data-i18n="locflow.process.title"></h2>
                </div>
            </div>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="process-step text-center">
                        <div class="process-number">01</div>
                        <h3 data-i18n="locflow.process.step1.title"></h3>
                        <p data-i18n="locflow.process.step1.desc"></p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="process-step text-center">
                        <div class="process-number">02</div>
                        <h3 data-i18n="locflow.process.step2.title"></h3>
                        <p data-i18n="locflow.process.step2.desc"></p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="process-step text-center">
                        <div class="process-number">03</div>
                        <h3 data-i18n="locflow.process.step3.title"></h3>
                        <p data-i18n="locflow.process.step3.desc"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="stack" class="section light">
        <div class="container">
            <div class="row mb-4">
                <div class="col">
                    <h2 class="section-title" data-i18n="locflow.stack.title"></h2>
                    <p data-i18n="locflow.stack.desc"></p>
                </div>
            </div>
        </div>
    </section>

    <section class="cta-banner">
        <div class="container text-center">
            <h2 data-i18n="locflow.cta.title"></h2>
            <p data-i18n="locflow.cta.desc"></p>
            <a href="consulting.html" class="btn btn-primary" data-i18n="locflow.cta.btn"></a>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="row gy-4 align-items-start">
                <!-- Column 1: Personal brand -->
                <div class="col-md-4">
                    <h4 class="footer-heading" data-i18n="consulting.footer.name"></h4>
                    <p class="footer-text" data-i18n="consulting.footer.tagline"></p>
                </div>

                <!-- Column 2: Navigation -->
                <div class="col-md-4">
                    <h4 class="footer-heading">Navigation</h4>
                    <ul class="footer-links">
                        <li><a href="#services" data-i18n="consulting.footer.nav.services"></a></li>
                        <li><a href="#process" data-i18n="consulting.footer.nav.process"></a></li>
                        <li><a href="#work" data-i18n="consulting.footer.nav.work"></a></li>
                        <li><a href="#book" data-i18n="consulting.footer.nav.book"></a></li>
                    </ul>
                </div>

                <!-- Column 3: Contact -->
                <div class="col-md-4">
                    <h4 class="footer-heading" data-i18n="consulting.footer.contact.title"></h4>
                    <p class="footer-text" data-i18n="consulting.footer.contact.desc"></p>
                    <p class="footer-text">
                        <a href="mailto:hello@badideainteractive.com">hello@badideainteractive.com</a>
                    </p>
                    <div class="footer-socials">
                        <a href="https://www.linkedin.com/in/david-florez-herrero-50b95b98/" aria-label="LinkedIn">LinkedIn</a>
                    </div>
                </div>
            </div>

            <div class="footer-bottom">
                <p class="footer-legal">
                    &copy; <span id="year"></span> David Florez Herrero. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener("scroll", () => {
            if (window.scrollY > 10) {
                document.body.classList.add("scrolled");
            } else {
                document.body.classList.remove("scrolled");
            }
        });

        document.getElementById("year").textContent = new Date().getFullYear();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/i18n.js"></script>
</body>
</html>
